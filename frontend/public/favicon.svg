<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Gradient for Orbit Ring -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Gradient for Geometric Leaf -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Inner Core Glow -->
    <linearGradient id="coreGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1ef189" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Heavy Outer Glow Filter (NASA-style thruster/data pulse) -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Blue Space / Farm Background Context (Optional, transparent if removed. Kept minimal or omitted. Will omit for true transparency, but let's add a subtle dark circle base for contrast) -->
  <!-- <circle cx="128" cy="128" r="128" fill="#0f172a" /> -->

  <!-- Outer Satellite Orbit Ring #1 (Tilted) -->
  <g transform="translate(128,128) rotate(-20) translate(-128,-128)">
    <ellipse cx="128" cy="128" rx="85" ry="30" fill="none" stroke="url(#orbitGrad)" stroke-width="4" stroke-dasharray="290 80" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Inner Data Wave / Orbit Ring #2 -->
  <g transform="translate(128,128) rotate(25) translate(-128,-128)">
    <ellipse cx="128" cy="128" rx="100" ry="20" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="10 15" opacity="0.4" />
  </g>

  <!-- Central Element: Geometric Leaf / Satellite Core -->
  <g transform="translate(128,128) rotate(45) translate(-128,-128)">
    <!-- Main Leaf Body -->
    <path 
      d="M128,30 C190,50 200,100 200,128 C200,190 150,200 128,200 C66,180 56,130 56,128 C56,66 106,56 128,30 Z" 
      fill="url(#leafGrad)" 
      opacity="0.85"
    />
    <!-- Sharp Tech Overlay (Precision AI Blade) -->
    <path 
      d="M128,30 L160,128 L128,200 Z" 
      fill="url(#coreGrad)" 
      filter="url(#softGlow)"
    />
    <!-- Circuit Data Node (Center) -->
    <circle cx="128" cy="128" r="12" fill="#ffffff" filter="url(#neonGlow)"/>
    <!-- Connecting Antenna / Vein -->
    <line x1="128" y1="30" x2="128" y2="200" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Satellite Communication Pulses -->
  <circle cx="210" cy="80" r="4" fill="#06b6d4" filter="url(#neonGlow)"/>
  <circle cx="50" cy="180" r="3.5" fill="#22c55e" filter="url(#softGlow)"/>
  <circle cx="170" cy="190" r="2.5" fill="#3b82f6" />
</svg>
