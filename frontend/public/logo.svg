<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 160" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="coreGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1ef189" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ==================== ICON SECTION ==================== -->
  <g transform="translate(16, 16) scale(0.5)">
    <!-- Scale to fit icon within roughly 128x128 space on the left -->
    <!-- Orbit 1 -->
    <g transform="translate(128,128) rotate(-20) translate(-128,-128)">
      <ellipse cx="128" cy="128" rx="85" ry="30" fill="none" stroke="url(#orbitGrad)" stroke-width="5" stroke-dasharray="290 80" stroke-linecap="round" opacity="0.7"/>
    </g>
    <!-- Orbit 2 -->
    <g transform="translate(128,128) rotate(25) translate(-128,-128)">
      <ellipse cx="128" cy="128" rx="100" ry="20" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-dasharray="10 15" opacity="0.5" />
    </g>
    <!-- Leaf Core -->
    <g transform="translate(128,128) rotate(45) translate(-128,-128)">
      <path d="M128,30 C190,50 200,100 200,128 C200,190 150,200 128,200 C66,180 56,130 56,128 C56,66 106,56 128,30 Z" fill="url(#leafGrad)" opacity="0.9"/>
      <path d="M128,30 L160,128 L128,200 Z" fill="url(#coreGrad)" filter="url(#softGlow)"/>
      <circle cx="128" cy="128" r="14" fill="#ffffff" filter="url(#neonGlow)"/>
      <line x1="128" y1="20" x2="128" y2="210" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    </g>
    <!-- Sat Pulses -->
    <circle cx="210" cy="80" r="5" fill="#06b6d4" filter="url(#neonGlow)"/>
    <circle cx="45" cy="175" r="4.5" fill="#22c55e" filter="url(#softGlow)"/>
  </g>

  <!-- ==================== TYPOGRAPHY SECTION ==================== -->
  
  <g transform="translate(170, 105)">
    <!-- "Agri" part in solid clean white (or dark for light themes, but user specified primary dark UI usage, so leaning light text. We make it white/gray) -->
    <text 
      x="0" 
      y="0" 
      font-family="'Inter', 'Montserrat', 'Helvetica Neue', sans-serif" 
      font-size="88" 
      font-weight="800" 
      letter-spacing="-1.5" 
      fill="#ffffff">
      Agri
    </text>
    
    <!-- "Sat" part stylized in green/cyan gradient with more tech-like tracking -->
    <text 
      x="200" 
      y="0" 
      font-family="'Inter', 'Montserrat', 'Helvetica Neue', sans-serif" 
      font-size="88" 
      font-weight="300" 
      letter-spacing="2" 
      fill="url(#orbitGrad)">
      Sat
    </text>

    <!-- Subtitle (Tracking/AI indicator line) -->
    <!-- Minimalist line indicating precision data horizon -->
    <line x1="5" y1="20" x2="400" y2="20" stroke="#374151" stroke-width="2" />
    <line x1="5" y1="20" x2="120" y2="20" stroke="#10b981" stroke-width="2" filter="url(#softGlow)" />
    
    <text 
      x="5" 
      y="38" 
      font-family="'Orbitron', 'Inter', monospace" 
      font-size="14" 
      font-weight="600" 
      letter-spacing="4.5" 
      fill="#94a3b8">
      SATELLITE INTELLIGENCE
    </text>
  </g>
</svg>
